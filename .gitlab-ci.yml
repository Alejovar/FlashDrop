stages:
  - validate
  - build
  - deploy

variables:
  DEPLOY_USER: "deploy"
  DEPLOY_PATH: "/var/www/flashdrop"
  DEPLOY_HOST: "143.244.165.130"

validate_php:
  stage: validate
  image: php:8.3-cli
  script:
    - find . -name "*.php" -type f ! -path "./vendor/*" -exec php -l {} \;
  only:
    - main

build_artifacts:
  stage: build
  image: alpine:latest
  script:
    - apk add --no-cache zip
    - zip -rq flashdrop-build.zip . -x "*.git*" "node_modules/*" "uploads/*" "!uploads/.htaccess"
  artifacts:
    paths:
      - flashdrop-build.zip
    expire_in: 1 day
  only:
    - main

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client git
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - |
      ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << 'REMOTE_SCRIPT'
        if [ ! -d $DEPLOY_PATH/.git ]; then
          mkdir -p $DEPLOY_PATH
          cd $DEPLOY_PATH
          git clone https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git .
        else
          cd $DEPLOY_PATH
          git pull origin main
        fi
        chmod -R 775 uploads/ video/
        sudo systemctl reload php8.3-fpm
        sudo systemctl reload nginx
      REMOTE_SCRIPT
  only:
    - main
  when: manual