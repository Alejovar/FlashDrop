stages:
  - validate
  - deploy

validate_php:
  stage: validate
  image: php:8.3-cli
  script:
    - find . -name "*.php" -type f ! -path "./vendor/*" -exec php -l {} \;
  only:
    - main

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} "sudo mkdir -p /var/www/flashdrop && sudo chown -R ${DEPLOY_USER}:www-data /var/www/flashdrop"
    - rsync -az --delete --exclude=".git" --exclude="uploads" -e "ssh -i ~/.ssh/deploy_key" ./ ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/flashdrop/
    - ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} "cd /var/www/flashdrop && mysql -u root flashdrop < db.sql && mkdir -p uploads video && chmod -R 775 uploads video && sudo chown -R ${DEPLOY_USER}:www-data /var/www/flashdrop && sudo systemctl reload php8.3-fpm && sudo systemctl reload nginx"
  only:
    - main
  when: manual